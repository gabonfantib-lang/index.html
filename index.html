<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Consulta de Crédito</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
margin-top:60px;
}

.container{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:200px;
margin-top:10px;
}

button{
padding:10px 20px;
margin-top:15px;
background:#2a7cff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.opcion{
background:#f0f4ff;
margin-top:15px;
padding:10px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>Consultá tu crédito</h2>

<p>Ingresá tu DNI</p>

<input type="number" id="dni" placeholder="Ej: 30123456">

<br>

<button onclick="buscar()">Consultar</button>

<div id="resultado"></div>

</div>

<script>

let telefono="5492611234567";

let baseDatos = {

"30123456":1200000,
"41191332":1500000,
"39089575":2000000

};

function calcularCuota(monto){

let tasa = 0.10;
let meses = 36;

let cuota=(monto*tasa)/(1-Math.pow(1+tasa,-meses));

return Math.round(cuota);

}

function buscar(){

let dni=document.getElementById("dni").value;

let cupo=baseDatos[dni];

if(!cupo){

document.getElementById("resultado").innerHTML="<p>DNI no encontrado</p>";
return;

}

let opcion1=Math.round(cupo*0.5);
let opcion2=Math.round(cupo*0.75);
let opcion3=cupo;

let cuota1=calcularCuota(opcion1);
let cuota2=calcularCuota(opcion2);
let cuota3=calcularCuota(opcion3);

let link1="https://wa.me/"+542615342222+"?text=Hola%20consulté%20mi%20crédito%20con%20DNI%20"+dni+"%20y%20quiero%20$"+opcion1;
let link2="https://wa.me/"+542615342222+"?text=Hola%20consulté%20mi%20crédito%20con%20DNI%20"+dni+"%20y%20quiero%20$"+opcion2;
let link3="https://wa.me/"+542615342222+"?text=Hola%20consulté%20mi%20crédito%20con%20DNI%20"+dni+"%20y%20quiero%20$"+opcion3;

document.getElementById("resultado").innerHTML=

"<h3>Opciones disponibles</h3>"+

"<div class='opcion'>"+
"<b>$"+opcion1.toLocaleString()+"</b><br>"+
"36 cuotas aprox $"+cuota1.toLocaleString()+"<br><br>"+
"<a href='"+link1+"' target='_blank'><button>Solicitar por WhatsApp</button></a>"+
"</div>"+

"<div class='opcion'>"+
"<b>$"+opcion2.toLocaleString()+"</b><br>"+
"36 cuotas aprox $"+cuota2.toLocaleString()+"<br><br>"+
"<a href='"+link2+"' target='_blank'><button>Solicitar por WhatsApp</button></a>"+
"</div>"+

"<div class='opcion'>"+
"<b>$"+opcion3.toLocaleString()+"</b><br>"+
"36 cuotas aprox $"+cuota3.toLocaleString()+"<br><br>"+
"<a href='"+link3+"' target='_blank'><button>Solicitar por WhatsApp</button></a>"+
"</div>";

}

</script>

</body>
</html>
